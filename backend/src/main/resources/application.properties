spring.application.name=skyzen-careers-backend

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

spring.jpa.properties.hibernate.dialect=${DB_DIALECT}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET}
jwt.expiry-hours=${JWT_EXPIRY_HOURS:24}

cors.allowed-origins=${CORS_ORIGINS}

admin.email=${ADMIN_EMAIL:admin@skyzen.test}
admin.password=${ADMIN_PASSWORD:admin12345}

# Resume storage (demo-grade local disk; switch to S3 + KMS for production).
# On Railway, set RESUME_STORAGE_PATH to a persistent volume mount.
app.resume.storage-path=${RESUME_STORAGE_PATH:./uploads/resumes}

# Multipart upload limits (resume max 10MB).
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
