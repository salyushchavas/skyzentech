spring.application.name=skyzen-careers-backend

# F4 — include the per-request traceId (TraceIdFilter / MDC) in every
# log line. Format `<LEVEL> [<traceId>]` so a user-reported error
# (which now includes the traceId in the response body + X-Trace-Id
# response header) is one grep away from the backend log.
logging.pattern.level=%5p [%X{traceId:-}]

# F4 — lock down the error path. ApiErrorController owns /error and
# emits the ErrorResponse JSON contract; the Whitelabel page + the
# Spring default error attributes (exception class, stack, raw
# message) must never reach the client.
server.error.whitelabel.enabled=false
server.error.include-exception=false
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

spring.jpa.properties.hibernate.dialect=${DB_DIALECT}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET}
# Legacy property — kept for back-compat. When ACCESS_TOKEN_TTL_MINUTES is at
# its default (15), this hours value (if set explicitly) wins; otherwise the
# minutes setting governs.
jwt.expiry-hours=${JWT_EXPIRY_HOURS:0}

# Session management — short-lived access tokens + rotating refresh tokens.
# Defaults: 15-min access, 14-day refresh. Set via env to override.
app.auth.access-token-ttl-minutes=${ACCESS_TOKEN_TTL_MINUTES:15}
app.auth.refresh-token-ttl-days=${REFRESH_TOKEN_TTL_DAYS:14}

cors.allowed-origins=${CORS_ORIGINS}

admin.email=${ADMIN_EMAIL:admin@skyzen.test}
admin.password=${ADMIN_PASSWORD:admin12345}

# Test-account seeder — when true, TestAccountSeeder creates three
# pre-baked test users (test-eval / test-rm / test-intern) + an engagement
# + one allocated project on every boot. Idempotent. NEVER set true in
# production: the seeded accounts ship with known fixed passwords.
app.seed.test-accounts-enabled=${SEED_TEST_ACCOUNTS:false}

# One-off backfill — when true, UnstickOnboardingRunner finds engagements
# stuck in PENDING_COMPLIANCE with all compliance items already done and
# auto-advances them to READY_TO_START. Safe to leave on indefinitely
# (idempotent, no-op after the first sweep) but typically only needed once
# after the EngagementAutoAdvancer change lands.
app.backfill.unstuck-onboarding-enabled=${BACKFILL_UNSTUCK_ONBOARDING:false}

# TEMP: promote test user abhizoe5+test5@gmail.com to ACTIVE intern state
# on boot. One-time. Set false after use. The runner is idempotent + gated;
# logs are tagged [TestUserPromotionRunner] for grep-removal.
app.bootstrap.promote-test-user-enabled=${PROMOTE_TEST_USER:false}

# One-shot test-role-user seed (TestRoleUserSeeder). Creates one user per
# role on the 8-role taxonomy with documented credentials so every role is
# loginable from a single consistent set. Idempotent (skips existing
# emails). Set true once to seed, then revert to false. NEVER true in
# production — credentials are documented in source + commit history.
app.bootstrap.seed-test-role-users-enabled=${SEED_TEST_ROLE_USERS:false}

# UserRoleReconciliationRunner. On every boot, walks users + engagements and
# promotes APPLICANT -> INTERN for any user whose engagement is already in
# READY_TO_START / ACTIVE / COMPLETED. Never auto-demotes; INTERNs without a
# matching engagement are warned about, not changed. Default ON because the
# work is cheap, idempotent, and the cache it maintains drives every cycle
# page's role gate. Kill-switch when needed:
#   app.bootstrap.reconcile-user-roles-enabled=false
app.bootstrap.reconcile-user-roles-enabled=${RECONCILE_USER_ROLES:true}

# Judge0 (RapidAPI) coding-playground sandbox. The API key MUST come from
# the JUDGE0_RAPIDAPI_KEY env var — never committed. Leaving it unset
# boots the app cleanly; /api/v1/playground/run then returns a typed
# "sandbox not configured" result and /api/v1/playground/languages
# returns []. Base URL + host default to the Judge0 CE deployment on
# RapidAPI and only need overriding if you switch sandboxes.
app.judge0.api-key=${JUDGE0_RAPIDAPI_KEY:}
app.judge0.base-url=${JUDGE0_BASE_URL:https://judge0-ce.p.rapidapi.com}
app.judge0.host=${JUDGE0_HOST:judge0-ce.p.rapidapi.com}

# Resume storage (demo-grade local disk; switch to S3 + KMS for production).
# On Railway, set RESUME_STORAGE_PATH to a persistent volume mount.
app.resume.storage-path=${RESUME_STORAGE_PATH:./uploads/resumes}

# Multipart upload limits (resume max 10MB).
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Transactional email (C3). Leaving SMTP_HOST / SMTP_USERNAME unset boots the
# LogEmailProvider fallback — emails go to the application log instead of an
# inbox. Set the full set (HOST, PORT, USERNAME, PASSWORD, MAIL_FROM,
# MAIL_FROM_NAME) on prod to enable real send. With Gmail / Workspace / 2FA
# you must use an APP PASSWORD, not the account login password.
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.enable=${SMTP_SSL:false}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.mail.from=${MAIL_FROM:noreply@skyzentech.com}
app.mail.from-name=${MAIL_FROM_NAME:Skyzen Tech}
# Public URL the email template references for the brand logo (clients block
# inline assets). The default points at the frontend's published asset.
app.mail.logo-url=${MAIL_LOGO_URL:https://www.skyzentech.com/images/skyzen-logo.png}
# Public URL the footer / brand link points at.
app.mail.brand-url=${MAIL_BRAND_URL:https://www.skyzentech.com}

# ── Brand identity (white-label) ───────────────────────────────────────
# Surfaces in email body copy, activation invites, offer letters, and any
# notification text the system sends. Defaults to Skyzen so the existing
# deployment is byte-unchanged. Each per-brand deploy overrides these in
# Railway env. The mail-from-name above remains the From: header personal
# name and is intentionally separate so brand.name can be "Acme Tech"
# while From: stays "no-reply" / "Acme HR" / etc.
app.brand.name=${BRAND_NAME:Skyzen Tech}
app.brand.product-name=${BRAND_PRODUCT_NAME:Skyzen Careers}
app.brand.legal-name=${BRAND_LEGAL_NAME:Skyzen Technologies LLC}
app.brand.support-email=${BRAND_SUPPORT_EMAIL:careers@skyzentech.com}

# Password-reset URL template — {token} is replaced at send time. Set
# PASSWORD_RESET_URL_TEMPLATE on prod to the frontend's reset page; default
# matches the local dev frontend on port 3000.
app.password-reset.url-template=${PASSWORD_RESET_URL_TEMPLATE:http://localhost:3000/careers/reset-password?token={token}}

# Batch-1 notifications. The ops email is the recipient for the
# "offer accepted" heads-up; leave it blank to skip the ops send (a warning
# logs once per skip so misconfig is visible). The dashboard URL is the
# CTA on the onboarding welcome; the offer view template is the CTA on the
# offer-extended email ({id} is replaced with the offer UUID).
app.ops.notification-email=${OPS_NOTIFICATION_EMAIL:}
app.onboarding.dashboard-url=${ONBOARDING_DASHBOARD_URL:https://www.skyzentech.com/careers/intern}
app.offer.view-url-template=${OFFER_VIEW_URL_TEMPLATE:https://www.skyzentech.com/careers/intern/offers/{id}}

# Batch-2 notifications. HR dashboard URL is the CTA on HR-targeted compliance
# emails (I-9 §2 pending, I-983 ready for employer signature).
app.hr.dashboard-url=${HR_DASHBOARD_URL:https://www.skyzentech.com/careers/hr}

# Batch-3 notifications. Supervisor dashboard URL is the CTA on supervisor-
# targeted emails (project submitted, evaluation due).
app.supervisor.dashboard-url=${SUPERVISOR_DASHBOARD_URL:https://www.skyzentech.com/careers/trainer}

# GitHub App — prerequisite for the workspace / PR-based submission build.
# Leaving any of these blank leaves GitHubService unconfigured (boot does
# NOT fail). The private key is PEM-encoded; in env-var contexts that
# don't tolerate real newlines, escape them as \n and the loader will
# un-escape on read.
app.github.app-id=${GITHUB_APP_ID:}
app.github.installation-id=${GITHUB_INSTALLATION_ID:}
app.github.org-name=${ORG_NAME:}
app.github.private-key=${GITHUB_PRIVATE_KEY:}

# AWS S3 storage (documents + resumes migration target; capability only
# in this phase — NOT yet wired to any read/write path). Soft-configured:
# if any of the four required vars are missing, the service is a no-op
# and boot continues unaffected (mirrors GitHub + Zoom patterns).
#   AWS_S3_BUCKET, AWS_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
# For S3-compatible providers (Cloudflare R2, MinIO, Backblaze B2), set
# AWS_S3_ENDPOINT_OVERRIDE to the provider URL. Force path-style
# addressing with AWS_S3_PATH_STYLE=true when the provider requires it
# (R2 works either way; MinIO needs path-style).
# AWS_S3_BRAND_PREFIX prepends a brand namespace to every key (e.g.
# "skyzen" → keys become skyzen/documents/...) so multi-brand deploys
# can share a bucket. Default empty.
# AWS_S3_ENABLED kill-switch defaults true; flip to false to force-disable
# without removing credentials (parallels the Zoom kill-switch).
app.s3.bucket=${AWS_S3_BUCKET:}
app.s3.region=${AWS_REGION:}
app.s3.access-key-id=${AWS_ACCESS_KEY_ID:}
app.s3.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
app.s3.endpoint-override=${AWS_S3_ENDPOINT_OVERRIDE:}
app.s3.path-style=${AWS_S3_PATH_STYLE:false}
app.s3.brand-prefix=${AWS_S3_BRAND_PREFIX:}
app.s3.enabled=${AWS_S3_ENABLED:true}

# Zoom Server-to-Server OAuth (interview meeting auto-creation).
# Required env vars (set on Railway, from a Zoom Marketplace
# "Server-to-Server OAuth" app with the meeting:write + meeting:read scope):
#   ZOOM_ACCOUNT_ID, ZOOM_CLIENT_ID, ZOOM_CLIENT_SECRET
# Integration auto-enables when ALL three are present. The kill-switch
# ZOOM_ENABLED defaults to true and exists only to force-disable Zoom
# while leaving creds in place; do NOT set it just to enable Zoom — set
# the three credentials. Previous behaviour (defaulting to false) was the
# main "Zoom doesn't work" footgun: creds set, toggle forgotten.
zoom.account-id=${ZOOM_ACCOUNT_ID:}
zoom.client-id=${ZOOM_CLIENT_ID:}
zoom.client-secret=${ZOOM_CLIENT_SECRET:}
zoom.enabled=${ZOOM_ENABLED:true}

# Offer signing runs through IDMS (in-house signing service —
# OfferIdmsSigningService). No external e-signature credentials are
# needed: the applicant signs at /careers/intern/offer/sign/{id} and
# the signature image + typed name are stored inline on the offer row.

# Phase 4 — PII at-rest encryption key (32 bytes base64). Reuses the same
# secret as I9_ENCRYPTION_KEY; setting either env var is sufficient (the
# Phase 4 doc names it PII_ENCRYPTION_KEY; legacy deployments may still set
# I9_ENCRYPTION_KEY).
pii.encryption.key=${PII_ENCRYPTION_KEY:${I9_ENCRYPTION_KEY:}}
# Local on-disk vault for document storage. Resume / SIGNED_OFFER / future
# onboarding-attached files all land here. Override per environment.
app.documents.storage-path=${DOCUMENTS_STORAGE_PATH:./uploads/documents}
# Frontend origin used to build the embedded-signing returnUrl. Defaults to
# the prod careers domain; override per environment.
app.frontend.base-url=${FRONTEND_BASE_URL:https://www.skyzentech.com}

# Phase 8.6.4 — single Trainer + single Evaluator used org-wide are
# auto-linked onto each new InternLifecycle at offer-sign time. Look-up is by
# email against the users table; the resolved user must hold the matching
# TRAINER / TRAINER (the codebase uses TRAINER for both training + evaluation
# roles today). Blank value = skip auto-link, ERM does it manually.
# Manager intentionally NOT in this set — it varies per intern and is
# assigned inline from the New Hire detail page.
app.default-trainer-email=${DEFAULT_TRAINER_EMAIL:}
app.default-evaluator-email=${DEFAULT_EVALUATOR_EMAIL:}

# ── Skyzen Mail (internal web-mail module, /api/mail/**) ───────────────
# Self-contained additive module. NOTE: app.mail.* above is Skyzen's SMTP /
# outbound-notification config and is UNRELATED — the mail module lives under
# app.webmail.* on purpose to avoid any collision.
#
# Separate JWT signing secret for the mail chain. MUST be >=32 bytes and
# DISTINCT from JWT_SECRET so mail and Skyzen tokens are mutually
# non-validatable. Generate with `openssl rand -base64 48`. BOOT-SAFE: if unset
# or too short the app STILL BOOTS (the mail module is additive and must never
# crash core) — the mail chain just returns 503 MAIL_NOT_CONFIGURED until set.
app.webmail.jwt.secret=${MAIL_JWT_SECRET:}
app.webmail.auth.access-token-ttl-minutes=${MAIL_ACCESS_TOKEN_TTL_MINUTES:15}
app.webmail.auth.refresh-token-ttl-days=${MAIL_REFRESH_TOKEN_TTL_DAYS:14}

# Bootstrap mail super-admin + domain (MailAdminSeeder, @Order(7)). Idempotent
# and gated: set SEED_MAIL_ADMIN=true once with MAIL_ADMIN_EMAIL/PASSWORD set,
# then revert to false. The seeded account ships must_change_password=true.
# NEVER leave a known MAIL_ADMIN_PASSWORD set in production after first boot.
app.webmail.seed.admin-enabled=${SEED_MAIL_ADMIN:false}
app.webmail.seed.admin-email=${MAIL_ADMIN_EMAIL:}
app.webmail.seed.admin-password=${MAIL_ADMIN_PASSWORD:}
app.webmail.seed.admin-domain=${MAIL_ADMIN_DOMAIN:skyzentech.com}
# Admin provisioning — length of server-generated one-time passwords (>=12).
app.webmail.provisioning.generated-password-length=${MAIL_GENERATED_PASSWORD_LENGTH:16}
# Mail core (messages/folders/search) — sizing + limits.
app.webmail.messages.default-page-size=${MAIL_DEFAULT_PAGE_SIZE:25}
app.webmail.messages.max-page-size=${MAIL_MAX_PAGE_SIZE:100}
app.webmail.messages.max-subject-length=${MAIL_MAX_SUBJECT_LENGTH:500}
app.webmail.messages.max-body-length=${MAIL_MAX_BODY_LENGTH:100000}
app.webmail.messages.max-recipients=${MAIL_MAX_RECIPIENTS:100}
# Bounded candidate scan for caller-scoped search (subject + participants only;
# body search is deferred since bodies are encrypted at rest and not searchable).
app.webmail.messages.search-scan-cap=${MAIL_SEARCH_SCAN_CAP:500}
# Attachment max size in bytes (default 25 MiB). Uploads stream a raw octet body
# (NOT Spring multipart) and are bounded by this cap, so the global 10 MB
# multipart limit (careers resume uploads) is untouched. Bytes are AES-encrypted
# before S3 upload (reusing the careers S3 bucket + the shared cipher key).
app.webmail.attachment-max-bytes=${MAIL_ATTACHMENT_MAX_BYTES:26214400}

# Mail bridge Phase 4 — public URL the credential email points the
# intern at to log into their NEW company mailbox on first sign-in.
# Default targets the in-house webmail UI; override per deploy if the
# mailbox lives on a different surface.
app.webmail.login-url=${WEBMAIL_LOGIN_URL:https://www.skyzentech.com/mail/login}
